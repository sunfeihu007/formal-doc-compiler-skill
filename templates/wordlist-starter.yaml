# Compliance wordlist — empty starter.
# Copy this file to .compliance/wordlist.yaml in your project folder, then add
# project-specific terms as they come up.
#
# Category structure is just for grouping in the report. Add or rename freely.
# `suggested_replacement` is shown to the writer when a hit is reported.
#
# Terms are LITERAL by default — matched case-insensitively and
# width-insensitively (full-width ＧＬＭ matches GLM). Regex metacharacters
# in literals are safe: "C++" matches the literal string C++.
#
# For a regex pattern, prefix the term with "regex:", e.g.
#   - "regex:\\d+\\s*并发"
# Avoid \b next to CJK characters — Python counts CJK as word characters,
# so "\\d+秒\\b" silently fails on "3秒内". Write "\\d+\\s*秒" instead.

categories:

  third_party_brands:
    description: "Brand names from other vendors that should not appear in our outbound docs."
    suggested_replacement: "a leading <category> tool"
    terms: []

  competitor_products:
    description: "Specific competitor products our doc should not name."
    suggested_replacement: ""
    terms: []

  specific_models:
    description: "Specific AI/ML model names that lock the doc to a vendor."
    suggested_replacement: "mainstream large language model"
    terms: []

  specific_hardware:
    description: "Specific hardware / chip vendor names that lock the doc to a supplier."
    suggested_replacement: "mainstream domestic accelerator"
    terms: []

  hard_metrics:
    description: "Specific numeric performance claims that should be deferred to the implementation plan."
    suggested_replacement: "to be evaluated jointly during implementation"
    terms: []

  hard_dates:
    description: "Specific months / dates that prematurely fix timeline."
    suggested_replacement: "per the schedule jointly agreed in the implementation plan"
    terms: []

  other_companies:
    description: "Other companies / institutions that should not appear in our outbound docs."
    suggested_replacement: "<peer institution>"
    terms: []

  other_locations:
    description: "Specific cities / branch names that should not appear (e.g., demo data leakage)."
    suggested_replacement: "<region / branch>"
    terms: []

  other:
    description: "Catch-all for project-specific terms that don't fit above."
    suggested_replacement: ""
    terms: []
